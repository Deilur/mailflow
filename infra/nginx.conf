# ──────────────────────────────────────────────────────────────
# Nginx config for MailFlow
# Place at: /etc/nginx/sites-available/mailflow
# Then: ln -s /etc/nginx/sites-available/mailflow /etc/nginx/sites-enabled/
# ──────────────────────────────────────────────────────────────
#
# Replace:
#   mail.tudominio.com  →  your real domain (or use server IP)
#   /opt/mailflow        →  your actual deploy directory
#
# TLS: run  certbot --nginx -d mail.tudominio.com  after testing

server {
    listen 80;
    listen [::]:80;
    server_name mail.tudominio.com;

    # ── Static frontend ──────────────────────────────────────
    root /opt/mailflow/dist/public;
    index index.html;

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API proxy ────────────────────────────────────
    # All /api/* requests → MailFlow Express server (port 5000)
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    # ── Cache static assets ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

